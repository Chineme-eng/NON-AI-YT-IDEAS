            --cat-tech: #2980B9;
            --cat-prod: #27AE60;
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--bg-cream);
            color: var(--text-black);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 40px 20px;
            line-height: 1.5;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        header {
            border-bottom: 2px solid var(--text-black);
            padding-bottom: 20px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        h1 {
            font-size: 2rem;
            margin: 0;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .stats {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-gray);
        }

        .filters {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        button.filter-btn {
            background: none;
            border: 1px solid var(--border-color);
            padding: 6px 14px;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-gray);
            cursor: pointer;
            border-radius: 4px;
        }

        button.filter-btn.active {
            background: var(--text-black);
            color: var(--bg-cream);
            border-color: var(--text-black);
        }

        .list-container {
            border-top: 1px solid var(--border-color);
        }

        .row {
            border-bottom: 1px solid var(--border-color);
        }

        .row-header {
            display: grid;
            grid-template-columns: 120px 1fr 100px;
            align-items: center;
            padding: 16px 0;
            cursor: pointer;
            gap: 15px;
        }

        .row-header:hover .title {
            text-decoration: underline;
        }

        .badge {
            font-size: 0.7rem;
            font-weight: 700;
            padding: 3px 8px;
            border-radius: 3px;
            color: white;
            text-align: center;
            letter-spacing: 0.5px;
        }

        .badge.web { background-color: var(--cat-web); }
        .badge.tech { background-color: var(--cat-tech); }
        .badge.productivity { background-color: var(--cat-prod); }

        .title {
            font-size: 1.05rem;
            font-weight: 600;
            margin: 0;
        }

        .difficulty {
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text-gray);
            text-align: right;
        }

        .row-details {
            display: none;
            padding: 0 0 20px 135px; /* Aligns with title */
        }

        .row.open .row-details {
            display: block;
        }

        .desc {
            font-size: 0.95rem;
            color: var(--text-gray);
            margin-bottom: 15px;
            max-width: 700px;
        }

        .meta-grid {
            display: grid;
            grid-template-columns: auto 1fr;
            gap: 8px 15px;
            font-size: 0.85rem;
            background: #F0EFEA;
            padding: 12px;
            border-radius: 4px;
            max-width: 700px;
        }

        .meta-label {
            font-weight: 700;
            color: var(--text-black);
        }

        .meta-value a {
            color: var(--cat-tech);
            text-decoration: none;
            font-weight: 600;
        }

        .meta-value a:hover {
            text-decoration: underline;
        }

        @media (max-width: 600px) {
            .row-header {
                grid-template-columns: 1fr;
                gap: 5px;
            }
            .row-details {
                padding: 0 0 20px 0;
            }
            .difficulty {
                text-align: left;
            }
        }
    </style>
</head>

            c: "PRODUCTIVITY", d: "Medium Easy",
            desc: "A proactive student guide. Shows taking every syllabus on day one, entering all major exam dates and assignment deadlines into a master calendar, and setting automated reminders two weeks before each major deadline.",
            tools: "Google Calendar", l: "None"
        },
        {
            t: "The Best White Noise Apps for Deep Focus",
            c: "PRODUCTIVITY", d: "Easy",
            desc: "Exploring auditory environments for studying. Reviews apps that mix cafe sounds, rain, and binaural beats, explaining the science behind how constant ambient noise masks distracting sudden sounds in shared dorms or offices.",
            tools: "Noisli, MyNoise", l: "https://mynoise.net"
        },
        {
            t: "How to Journal Digitally (Without Failing)",
            c: "PRODUCTIVITY", d: "Easy",
            desc: "Removing the pressure of writing long diary entries. Shows how to set up a template with just three prompts (One win, one challenge, one gratitude) to build a consistent, low-friction daily reflection habit.",
            tools: "Day One, Journey", l: "https://dayoneapp.com"
        },
        {
            t: "How to Launch Projects Faster with AI",
            c: "PRODUCTIVITY", d: "Medium",
            desc: "A workflow for builders. Demonstrates how to use unified AI platforms to instantly generate project outlines, draft copy, and organize tasks in one place, proving that consolidated tools beat fragmented apps for rapid execution.",
            tools: "Unified Workspaces", l: "None"
        }
    ];

    const grid = document.getElementById('vault-list');
    const filterBtns = document.querySelectorAll('.filter-btn');
    const stats = document.getElementById('vault-stats');

    function renderList(filter) {
        grid.innerHTML = '';
        const filteredData = filter === 'all' 
            ? vaultData 
            : vaultData.filter(item => item.c === filter);

        stats.innerText = `Showing ${filteredData.length} highly descriptive ideas`;

        filteredData.forEach((item, index) => {
            const hasLink = item.l !== "None";
            const linkHtml = hasLink 
                ? `<a href="${item.l}" target="_blank">${item.l}</a>`
                : `<span style="color: #888;">No external link required</span>`;

            const rowHtml = `
                <div class="row" id="row-${index}">
                    <div class="row-header" onclick="toggleRow(${index})">
                        <div class="badge ${item.c.toLowerCase()}">${item.c}</div>
                        <h3 class="title">${item.t}</h3>
                        <div class="difficulty">${item.d}</div>
                    </div>
                    <div class="row-details">
                        <p class="desc">${item.desc}</p>
                        <div class="meta-grid">
                            <span class="meta-label">Tools:</span>
                            <span>${item.tools}</span>
                            <span class="meta-label">Link:</span>
                            <span class="meta-value">${linkHtml}</span>
                        </div>
                    </div>
                </div>
            `;
            grid.insertAdjacentHTML('beforeend', rowHtml);
        });
    }

    // Simple Accordion Logic
    window.toggleRow = function(index) {
        const row = document.getElementById(`row-${index}`);
        row.classList.toggle('open');
    }

    // Filter Logic
    filterBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            filterBtns.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderList(btn.getAttribute('data-filter'));
        });
    });

    // Initialize
    renderList('all');
</script>
