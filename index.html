<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Picao AI - Content Vault</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        :root {
            --bg-cream: #FAF9F6;
            --text-black: #1A1A1A;
            --text-light: #4A4A4A;
            --border-color: #E5E5E5;
            
            /* Placeholder Accent Colors for Differentiation */
            --color-web: #D35400; /* Burnt Orange */
            --color-tech: #2980B9; /* Strong Blue */
            --color-prod: #27AE60; /* Emerald Green */
            
            --diff-easy: #10B981;
            --diff-med-easy: #F59E0B;
            --diff-med: #EF4444;
        }

        body {
            background-color: var(--bg-cream);
            color: var(--text-black);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 40px 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        p.subtitle {
            color: var(--text-light);
            font-size: 1.1rem;
            max-width: 600px;
            margin: 0 auto;
        }

        .filters {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        button.filter-btn {
            background-color: transparent;
            border: 2px solid var(--border-color);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            color: var(--text-black);
            transition: all 0.2s ease;
        }

        button.filter-btn:hover, button.filter-btn.active {
            border-color: var(--text-black);
            background-color: var(--text-black);
            color: var(--bg-cream);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
        }

        .card {
            background: #FFFFFF;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
        }

        .badge {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: white;
        }

        .badge.web { background-color: var(--color-web); }
        .badge.tech { background-color: var(--color-tech); }
        .badge.productivity { background-color: var(--color-prod); }

        .difficulty {
            font-size: 0.8rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .diff-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .diff-easy { color: var(--diff-easy); }
        .diff-easy .diff-dot { background-color: var(--diff-easy); }
        
        .diff-med-easy { color: var(--diff-med-easy); }
        .diff-med-easy .diff-dot { background-color: var(--diff-med-easy); }
        
        .diff-med { color: var(--diff-med); }
        .diff-med .diff-dot { background-color: var(--diff-med); }

        .card-title {
            font-size: 1.25rem;
            font-weight: 700;
            margin: 0 0 10px 0;
            line-height: 1.3;
        }

        .card-desc {
            font-size: 0.95rem;
            color: var(--text-light);
            margin-bottom: 20px;
            flex-grow: 1;
        }

        .card-meta {
            font-size: 0.85rem;
            background-color: var(--bg-cream);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .meta-row {
            display: flex;
            margin-bottom: 5px;
        }
        
        .meta-row:last-child {
            margin-bottom: 0;
        }

        .meta-label {
            font-weight: 700;
            width: 60px;
            color: var(--text-black);
        }

        .meta-value {
            color: var(--text-light);
            flex: 1;
        }

        .card-link {
            display: inline-block;
            text-align: center;
            padding: 10px;
            background-color: var(--text-black);
            color: var(--bg-cream);
            text-decoration: none;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.9rem;
            transition: opacity 0.2s;
        }

        .card-link:hover {
            opacity: 0.8;
        }

        .card-link.disabled {
            background-color: var(--border-color);
            color: var(--text-light);
            pointer-events: none;
        }

    </style>
</head>

    const grid = document.getElementById('vault-grid');
    const filterBtns = document.querySelectorAll('.filter-btn');

    function renderCards(filter) {
        grid.innerHTML = '';
        const filteredData = filter === 'all' 
            ? vaultData 
            : vaultData.filter(item => item.category === filter);

        filteredData.forEach(item => {
            const hasLink = item.link !== "None";
            const linkHtml = hasLink 
                ? `<a href="${item.link}" target="_blank" class="card-link">Visit Resource &rarr;</a>`
                : `<a href="#" class="card-link disabled">No Link Required</a>`;

            const cardHtml = `
                <div class="card">
                    <div class="card-header">
                        <span class="badge ${item.category.toLowerCase()}">${item.category}</span>
                        <div class="difficulty ${item.diffClass}">
                            <div class="diff-dot"></div>
                            ${item.difficulty}
                        </div>
                    </div>
                    <h3 class="card-title">${item.title}</h3>
                    <p class="card-desc">${item.desc}</p>
                    <div class="card-meta">
                        <div class="meta-row">
                            <span class="meta-label">Tools:</span>
                            <span class="meta-value">${item.tools}</span>
                        </div>
                    </div>
                    ${linkHtml}
                </div>
            `;
            grid.insertAdjacentHTML('beforeend', cardHtml);
        });
    }

    // Filter Logic
    filterBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            filterBtns.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderCards(btn.getAttribute('data-filter'));
        });
    });

    // Initial Render
    renderCards('all');
