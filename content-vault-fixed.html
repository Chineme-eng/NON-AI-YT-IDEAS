<html lang="en">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Content Vault — 350 YouTube Ideas</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --cream:#FAF7F0;--cream2:#F3EFE6;--cream3:#E8E2D5;
  --ink:#1A1612;--ink2:#4A433B;--ink3:#8A8077;
  --web-bg:#EFF6FF;--web-border:#BFDBFE;--web-color:#1D4ED8;--web-dark:#1E3A8A;
  --tech-bg:#FFF7ED;--tech-border:#FED7AA;--tech-color:#C2410C;--tech-dark:#7C2D12;
  --prod-bg:#F0FDF4;--prod-border:#BBF7D0;--prod-color:#15803D;--prod-dark:#14532D;
  --easy-bg:#DCFCE7;--easy-color:#15803D;
  --medeast-bg:#FEF3C7;--medeast-color:#B45309;
  --med-bg:#FEE2E2;--med-color:#B91C1C;
}
body{background:var(--cream);font-family:'DM Sans',sans-serif;color:var(--ink);min-height:100vh}
a{color:inherit;text-decoration:none}

/* HEADER */
.site-header{background:var(--ink);color:#FAF7F0;padding:3rem 2rem 2.5rem;text-align:center;position:relative;overflow:hidden}
.site-header::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(45deg,transparent,transparent 40px,rgba(255,255,255,0.015) 40px,rgba(255,255,255,0.015) 41px)}
.header-eyebrow{font-size:0.72rem;letter-spacing:0.2em;text-transform:uppercase;color:#A09880;margin-bottom:0.75rem;font-weight:500}
.header-title{font-family:'Playfair Display',serif;font-size:clamp(2.2rem,5vw,3.8rem);font-weight:700;line-height:1.1;margin-bottom:0.6rem}
.header-title em{font-style:italic;color:#C9B99A}
.header-sub{font-size:1rem;color:#9A9080;font-weight:300;max-width:520px;margin:0 auto 1.5rem}
.stats-row{display:flex;gap:2rem;justify-content:center;flex-wrap:wrap;margin-top:1.5rem}
.stat-pill{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);border-radius:100px;padding:0.4rem 1.1rem;font-size:0.82rem;font-weight:500;color:#D4C9B8}
.stat-pill span{color:#FAF7F0;font-weight:600}

/* TOOLBAR */
.toolbar{position:sticky;top:0;z-index:100;background:var(--cream2);border-bottom:1.5px solid var(--cream3);padding:0.85rem 2rem;display:flex;flex-wrap:wrap;gap:0.75rem;align-items:center}
.search-wrap{flex:1;min-width:220px;position:relative}
.search-wrap input{width:100%;padding:0.55rem 1rem 0.55rem 2.4rem;border:1.5px solid var(--cream3);border-radius:100px;background:white;font-family:'DM Sans',sans-serif;font-size:0.9rem;color:var(--ink);outline:none;transition:border-color 0.2s}
.search-wrap input:focus{border-color:var(--ink3)}
.search-icon{position:absolute;left:0.8rem;top:50%;transform:translateY(-50%);opacity:0.4;font-size:0.9rem;pointer-events:none}
.filter-group{display:flex;gap:0.4rem;flex-wrap:wrap}
.filter-btn{padding:0.42rem 0.9rem;border-radius:100px;border:1.5px solid var(--cream3);background:white;font-family:'DM Sans',sans-serif;font-size:0.8rem;font-weight:500;cursor:pointer;color:var(--ink2);transition:all 0.15s}
.filter-btn:hover{border-color:var(--ink3)}
.filter-btn.active{background:var(--ink);color:white;border-color:var(--ink)}
.filter-btn.web.active{background:var(--web-color);border-color:var(--web-color)}
.filter-btn.tech.active{background:var(--tech-color);border-color:var(--tech-color)}
.filter-btn.prod.active{background:var(--prod-color);border-color:var(--prod-color)}
.filter-btn.easy-f.active{background:var(--easy-color);border-color:var(--easy-color)}
.filter-btn.medeast-f.active{background:var(--medeast-color);border-color:var(--medeast-color)}
.filter-btn.med-f.active{background:var(--med-color);border-color:var(--med-color)}
.divider{width:1px;height:28px;background:var(--cream3)}
.result-count{font-size:0.8rem;color:var(--ink3);white-space:nowrap;font-weight:500;margin-left:auto}

/* SECTION LABELS */
.section-label{padding:1.2rem 2rem 0.5rem;font-family:'Playfair Display',serif;font-size:1.4rem;font-weight:700;color:var(--ink);display:flex;align-items:center;gap:0.6rem}
.section-label .dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}

/* GRID */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1rem;padding:0.5rem 2rem 3rem}

/* CARD */
.card{background:white;border-radius:14px;border:1.5px solid var(--cream3);padding:1.1rem 1.15rem;display:flex;flex-direction:column;gap:0.55rem;transition:transform 0.15s,box-shadow 0.15s;position:relative;overflow:hidden}
.card:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,0.07)}
.card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;border-radius:4px 0 0 4px}
.card.web::before{background:var(--web-color)}
.card.tech::before{background:var(--tech-color)}
.card.prod::before{background:var(--prod-color)}

.card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:0.5rem}
.card-id{font-size:0.7rem;font-weight:600;color:var(--ink3);font-variant-numeric:tabular-nums;flex-shrink:0;margin-top:2px}
.badge-row{display:flex;gap:0.35rem;flex-wrap:wrap;align-items:center}
.cat-badge{font-size:0.68rem;font-weight:600;padding:0.22rem 0.55rem;border-radius:100px;letter-spacing:0.04em}
.cat-badge.web{background:var(--web-bg);color:var(--web-dark);border:1px solid var(--web-border)}
.cat-badge.tech{background:var(--tech-bg);color:var(--tech-dark);border:1px solid var(--tech-border)}
.cat-badge.prod{background:var(--prod-bg);color:var(--prod-dark);border:1px solid var(--prod-border)}
.diff-badge{font-size:0.65rem;font-weight:600;padding:0.2rem 0.5rem;border-radius:100px}
.diff-badge.easy{background:var(--easy-bg);color:var(--easy-color)}
.diff-badge.medeast{background:var(--medeast-bg);color:var(--medeast-color)}
.diff-badge.med{background:var(--med-bg);color:var(--med-color)}

.card-title{font-size:0.95rem;font-weight:600;color:var(--ink);line-height:1.35}
.card-sub{font-size:0.72rem;font-weight:500;color:var(--ink3);letter-spacing:0.03em;text-transform:uppercase}
.card-desc{font-size:0.83rem;color:var(--ink2);line-height:1.55;font-weight:300}
.card-tools{display:flex;flex-wrap:wrap;gap:0.35rem;margin-top:0.2rem}
.tool-chip{font-size:0.72rem;padding:0.2rem 0.55rem;background:var(--cream);border:1px solid var(--cream3);border-radius:100px;color:var(--ink2);font-weight:500;white-space:nowrap;transition:background 0.1s}
.tool-chip a{color:inherit}
.tool-chip:hover{background:var(--cream2)}
.card-footer{font-size:0.72rem;color:var(--ink3);margin-top:auto;padding-top:0.3rem;border-top:1px solid var(--cream2)}

/* NO RESULTS */
.no-results{grid-column:1/-1;text-align:center;padding:4rem 2rem;color:var(--ink3)}
.no-results h3{font-family:'Playfair Display',serif;font-size:1.5rem;margin-bottom:0.5rem;color:var(--ink2)}

/* FOOTER */
.site-footer{text-align:center;padding:2rem;border-top:1.5px solid var(--cream3);font-size:0.8rem;color:var(--ink3)}

@media(max-width:640px){
  .toolbar{padding:0.7rem 1rem}
  .cards-grid{padding:0.5rem 1rem 3rem;grid-template-columns:1fr}
  .section-label{padding:1rem 1rem 0.4rem}
  .stats-row{gap:0.75rem}
}
</style>
</head>

let catFilter='all', diffFilter='all';

function setFilter(type, value, btn){
  if(type==='cat'){
    catFilter=value;
    document.querySelectorAll('#catFilters .filter-btn').forEach(b=>b.classList.remove('active'));
  } else {
    diffFilter=value;
    document.querySelectorAll('#diffFilters .filter-btn').forEach(b=>b.classList.remove('active'));
  }
  btn.classList.add('active');
  applyFilters();
}

function applyFilters(){
  const q=document.getElementById('searchInput').value.toLowerCase().trim();
  const filtered=ideas.filter(i=>{
    const matchCat=catFilter==='all'||i.cat===catFilter;
    const matchDiff=diffFilter==='all'||i.diff===diffFilter;
    const matchSearch=!q||
      i.title.toLowerCase().includes(q)||
      i.desc.toLowerCase().includes(q)||
      i.sub.toLowerCase().includes(q)||
      i.tools.some(t=>t[0].toLowerCase().includes(q));
    return matchCat&&matchDiff&&matchSearch;
  });
  render(filtered);
  document.getElementById('resultCount').textContent=filtered.length+' idea'+(filtered.length!==1?'s':'');
}

function catLabel(c){return c==='web'?'🌐 Web':c==='tech'?'⚙️ Tech':'📋 Productivity';}
function diffLabel(d){return d==='easy'?'Easy':d==='medeast'?'Medium Easy':'Medium';}
function catColor(c){return c==='web'?'web':c==='tech'?'tech':'prod';}

function render(list){
  const container=document.getElementById('appContainer');
  if(!list.length){
    container.innerHTML='<div class="cards-grid"><div class="no-results"><h3>No ideas found</h3><p>Try a different search term or filter combination.</p></div></div>';
    return;
  }
  // Group by category
  const groups={web:[],tech:[],prod:[]};
  list.forEach(i=>groups[i.cat].push(i));
  const catNames={web:'Web — Websites, Tools & Tutorials',tech:'Tech — Fixes, Speed & Optimization',prod:'Productivity — Systems, Organization & Student Life'};
  const catDots={web:'#2563EB',tech:'#C2410C',prod:'#15803D'};
  let html='';
  ['web','tech','prod'].forEach(cat=>{
    if(!groups[cat].length) return;
    html+=`<div class="section-label"><span class="dot" style="background:${catDots[cat]}"></span>${catNames[cat]} <span style="font-family:'DM Sans',sans-serif;font-size:0.85rem;font-weight:400;color:var(--ink3);margin-left:0.5rem">(${groups[cat].length})</span></div>`;
    html+='<div class="cards-grid">';
    groups[cat].forEach(i=>{
      const toolsHtml=i.tools.map(t=>`<span class="tool-chip"><a href="${t[1]}" target="_blank" rel="noopener">${t[0]}</a></span>`).join('');
      html+=`<div class="card ${catColor(i.cat)}">
        <div class="card-top">
          <span class="card-id">#${String(i.id).padStart(3,'0')}</span>
          <div class="badge-row">
            <span class="cat-badge ${catColor(i.cat)}">${catLabel(i.cat)}</span>
            <span class="diff-badge ${i.diff}">${diffLabel(i.diff)}</span>
          </div>
        </div>
        <div class="card-sub">${i.sub}</div>
        <div class="card-title">${i.title}</div>
        <div class="card-desc">${i.desc}</div>
        <div class="card-tools">${toolsHtml}</div>
      </div>`;
    });
    html+='</div>';
  });
  container.innerHTML=html;
}

render(ideas);
</script>
